# Created: 2025-10-29 08:27 UTC

name: Recovery CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'recovery-*'
      - 'recovery/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: recovery-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Vercel recovery build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            story-generator/package-lock.json

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Angular dependencies
        run: npm ci --no-audit --no-fund
        working-directory: story-generator

      - name: Run recovery preflight
        run: scripts/recovery/preflight.sh --skip-status

      - name: Check Vercel configuration
        run: |
          test -f vercel.json
          node -e "const fs=require('fs'); const config=JSON.parse(fs.readFileSync('vercel.json','utf8')); if (!config.buildCommand || !config.outputDirectory) { throw new Error('vercel.json must define buildCommand and outputDirectory'); }"
